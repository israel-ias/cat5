server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Long-cache fingerprintable assets (fonts/images in /assets)
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Short cache for the HTML/CSS/JS at root so updates are picked up quickly
    location / {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Hide nginx version
    server_tokens off;
}
